spring:
  application:
    name: daner
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/v1/auth/google/callback}
            scope:
              - email
              - profile

server:
  port: 8080
  servlet:
    context-path: /v1

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  jwt:
    secret: ${JWT_SECRET:please-override-this-in-production-with-a-secret-of-at-least-32-bytes}
    access-token-validity-minutes: 30
    refresh-token-validity-days: 14
    signup-token-validity-minutes: 10
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}
  rate-limit:
    member-comments-per-minute: 10
    guest-comments-per-minute: 3
    member-likes-per-minute: 30
  popular-words:
    cron: "0 0 * * * *"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
