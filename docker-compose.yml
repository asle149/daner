services:
  postgres:
    image: postgres:16-alpine
    container_name: daner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: daner
      POSTGRES_USER: daner
      POSTGRES_PASSWORD: daner
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - daner-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daner -d daner"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  daner-postgres-data:
