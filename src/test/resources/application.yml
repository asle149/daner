spring:
  datasource:
    url: jdbc:h2:mem:daner-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
    show-sql: false
    open-in-view: false
  flyway:
    enabled: false

logging:
  level:
    org.hibernate.SQL: WARN

app:
  jwt:
    secret: test-secret-test-secret-test-secret-test-secret
    access-token-validity-minutes: 30
    refresh-token-validity-days: 14
    signup-token-validity-minutes: 10
  cors:
    allowed-origins: http://localhost:3000
  frontend:
    url: http://localhost:3000
